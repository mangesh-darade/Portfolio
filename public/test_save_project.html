<!DOCTYPE html>
<html>
<head>
    <title>Save Project Button Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .test-box { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        .info { color: blue; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Save Project Button Diagnostic Test</h1>
    
    <div class="test-box">
        <h2>Step 1: Check jQuery</h2>
        <button onclick="testJQuery()">Test jQuery</button>
        <div id="jqueryResult"></div>
    </div>
    
    <div class="test-box">
        <h2>Step 2: Check Base URL</h2>
        <button onclick="testBaseURL()">Test Base URL</button>
        <div id="baseURLResult"></div>
    </div>
    
    <div class="test-box">
        <h2>Step 3: Test AJAX Route</h2>
        <button onclick="testAjaxRoute()">Test Route</button>
        <div id="routeResult"></div>
    </div>
    
    <div class="test-box">
        <h2>Step 4: Check CSRF Token</h2>
        <button onclick="testCSRF()">Check CSRF</button>
        <div id="csrfResult"></div>
    </div>
    
    <div class="test-box">
        <h2>Step 5: Test Form Submit</h2>
        <p class="info">This will simulate the actual form submission</p>
        <button onclick="testFormSubmit()">Test Submit</button>
        <div id="submitResult"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        function testJQuery() {
            const result = document.getElementById('jqueryResult');
            if (typeof jQuery !== 'undefined') {
                result.innerHTML = '<p class="pass">✅ jQuery is loaded! Version: ' + jQuery.fn.jquery + '</p>';
            } else {
                result.innerHTML = '<p class="fail">❌ jQuery is NOT loaded!</p>';
            }
        }
        
        function testBaseURL() {
            const result = document.getElementById('baseURLResult');
            const testURL = 'http://localhost/Portfolio/public/admin/projects/add';
            result.innerHTML = '<p class="info">Testing URL: ' + testURL + '</p>';
            
            fetch(testURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            })
            .then(response => {
                result.innerHTML += '<p class="pass">✅ Route is accessible! Status: ' + response.status + '</p>';
                return response.text();
            })
            .then(data => {
                result.innerHTML += '<pre>' + data.substring(0, 500) + '...</pre>';
            })
            .catch(error => {
                result.innerHTML += '<p class="fail">❌ Error: ' + error.message + '</p>';
            });
        }
        
        function testAjaxRoute() {
            const result = document.getElementById('routeResult');
            result.innerHTML = '<p class="info">Testing AJAX route...</p>';
            
            $.ajax({
                url: 'http://localhost/Portfolio/public/admin/projects/add',
                type: 'POST',
                dataType: 'json',
                data: {
                    project_name: 'Test',
                    description: 'Test',
                    technologies: 'Test'
                },
                success: function(response) {
                    result.innerHTML = '<p class="pass">✅ AJAX Success!</p><pre>' + JSON.stringify(response, null, 2) + '</pre>';
                },
                error: function(xhr, status, error) {
                    result.innerHTML = '<p class="fail">❌ AJAX Error</p>';
                    result.innerHTML += '<p>Status: ' + xhr.status + '</p>';
                    result.innerHTML += '<p>Error: ' + error + '</p>';
                    result.innerHTML += '<pre>' + xhr.responseText + '</pre>';
                }
            });
        }
        
        function testCSRF() {
            const result = document.getElementById('csrfResult');
            const csrfCookieMatch = document.cookie.match(/csrf_cookie_name=([^;]+)/);
            
            if (csrfCookieMatch) {
                result.innerHTML = '<p class="pass">✅ CSRF Cookie found: ' + csrfCookieMatch[1].substring(0, 20) + '...</p>';
            } else {
                result.innerHTML = '<p class="info">ℹ️ No CSRF cookie (might be disabled)</p>';
            }
        }
        
        function testFormSubmit() {
            const result = document.getElementById('submitResult');
            result.innerHTML = '<p class="info">Submitting test data...</p>';
            
            const formData = new FormData();
            formData.append('project_name', 'Test Project');
            formData.append('description', 'Test Description');
            formData.append('technologies', 'PHP, MySQL');
            
            console.log('=== FormData Contents ===');
            for (var pair of formData.entries()) {
                console.log(pair[0] + ': ' + pair[1]);
            }
            
            $.ajax({
                url: 'http://localhost/Portfolio/public/admin/projects/add',
                type: 'POST',
                data: formData,
                contentType: false,
                processData: false,
                dataType: 'json',
                success: function(response) {
                    console.log('Success Response:', response);
                    result.innerHTML = '<p class="pass">✅ SUCCESS!</p><pre>' + JSON.stringify(response, null, 2) + '</pre>';
                },
                error: function(xhr, status, error) {
                    console.error('Error Response:', xhr.responseText);
                    result.innerHTML = '<p class="fail">❌ FAILED</p>';
                    result.innerHTML += '<p><strong>Status Code:</strong> ' + xhr.status + '</p>';
                    result.innerHTML += '<p><strong>Status Text:</strong> ' + status + '</p>';
                    result.innerHTML += '<p><strong>Error:</strong> ' + error + '</p>';
                    result.innerHTML += '<p><strong>Response:</strong></p><pre>' + xhr.responseText + '</pre>';
                }
            });
        }
    </script>
</body>
</html>
